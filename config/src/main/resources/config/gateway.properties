# APPLICATION
spring.application.name=gateway
server.port=8080
# EUREKA CLIENT
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# ROUTES
spring.cloud.gateway.routes[0].id=consultation-microservice
spring.cloud.gateway.routes[0].uri=lb://consultation-microservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/apiConsultation/**
spring.cloud.gateway.routes[1].id=CAR
spring.cloud.gateway.routes[1].uri=lb://CAR
spring.cloud.gateway.routes[1].predicates[0]=Path=/car/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
# Forum : préfixe public /apiForum → microservice nephro-forum (/api/...)
spring.cloud.gateway.routes[2].id=nephro-forum
spring.cloud.gateway.routes[2].uri=http://127.0.0.1:8097
spring.cloud.gateway.routes[2].predicates[0]=Path=/apiForum/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/apiForum/(?<segment>.*), /api/$\\{segment}
# Fichiers forum (/uploads/images/...)
spring.cloud.gateway.routes[3].id=nephro-forum-uploads
spring.cloud.gateway.routes[3].uri=http://127.0.0.1:8097
spring.cloud.gateway.routes[3].predicates[0]=Path=/uploads/**
# Abonnements (subscription-service)
spring.cloud.gateway.routes[4].id=subscription-service
spring.cloud.gateway.routes[4].uri=lb://subscription-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/subscriptions/**,/api/notifications/**,/api/risk/**,/api/adjustment/**,/api/promo/**,/api/recommendations/**,/promo/**
# LOGS
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG