spring.application.name=config
server.port=8888
# Config Server (native) : priorité classpath (portable), puis dépôt fichier du repo
spring.profiles.active=native
# classpath = portable ; fichiers relatifs selon le cwd (racine repo ou module config)
spring.cloud.config.server.native.search-locations=classpath:/config,file:./BackEnd/Microservices/config-repo,file:../Microservices/config-repo
