apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-ai
  template:
    metadata:
      labels:
        app: medical-ai
    spec:
      containers:
        - name: medical-ai
          image: mouhareb/medical-ai:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: medical-ai
spec:
  ports:
    - port: 8000
  selector:
    app: medical-ai
