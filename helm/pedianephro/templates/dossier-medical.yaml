apiVersion: apps/v1
kind: Deployment
metadata:
  name: dossier-medical
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dossier-medical
  template:
    metadata:
      labels:
        app: dossier-medical
    spec:
      containers:
        - name: dossier-medical
          image: "{{ .Values.image.registry }}/{{ .Values.dossier.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dossier.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/dossier_medical_db?createDatabaseIfNotExist=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
---
apiVersion: v1
kind: Service
metadata:
  name: dossier-medical
  namespace: {{ .Values.namespace }}
  labels:
    app: dossier-medical
    monitored: "true"
spec:
  type: NodePort
  selector:
    app: dossier-medical
  ports:
    - name: http
      port: {{ .Values.dossier.port }}
      targetPort: {{ .Values.dossier.port }}
      nodePort: {{ .Values.dossier.nodePort }}
