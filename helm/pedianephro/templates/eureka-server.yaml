apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: "{{ .Values.image.registry }}/{{ .Values.eureka.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.eureka.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: {{ .Values.namespace }}
  labels:
    app: eureka-server
    monitored: "true"
spec:
  selector:
    app: eureka-server
  ports:
    - name: http
      port: {{ .Values.eureka.port }}
      targetPort: {{ .Values.eureka.port }}
