spring.application.name=gateway
#config client configuration
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

# MS abonnements : lb://subscription-service → 503 si Eureka n'a aucune instance enregistrée.
# Démarrez Eureka (8761) + subscription-service, ou en local sans Eureka :
# gateway.subscription.uri=http://127.0.0.1:8099
gateway.subscription.uri=${GATEWAY_SUBSCRIPTION_URI:lb://subscription-service}

#config
management.endpoints.web.exposure.include=health, info, refresh