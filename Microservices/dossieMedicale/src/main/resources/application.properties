spring.application.name=dossieMedicale
# Défaut 8012 : évite le conflit si un autre processus garde 8010. Proxy Angular = même port. Pour forcer 8010 : SERVER_PORT=8010
server.port=${SERVER_PORT:8012}
server.servlet.context-path=/dossiemedicale

spring.datasource.url=jdbc:mysql://localhost:3306/dossier_medical_db?useUnicode=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Sérialisation JSON des dossiers (enfant / patient) dans la même requête HTTP
spring.jpa.open-in-view=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

spring.mail.username=benmoussaaziz.contact@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# URL du microservice User pour la synchro enfant -> patients (usersdb)
microservice.user.url=http://localhost:8083
microservice.consultation.url=http://localhost:8089/apiConsultation
