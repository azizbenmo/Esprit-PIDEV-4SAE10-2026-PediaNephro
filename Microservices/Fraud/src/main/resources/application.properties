server.port=${SERVER_PORT:8085}
spring.application.name=fraud-service

# Database Config (Default for local DEV, overriden in docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/PediaNephro?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.preferIpAddress=true

# Spring Cloud Config
spring.cloud.config.enabled=${SPRING_CLOUD_CONFIG_ENABLED:true}
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8899}

# Actuator
management.endpoints.web.exposure.include=health,info

# Custom URLs
AI_SERVICE_URL=${AI_SERVICE_URL:http://localhost:8000}

