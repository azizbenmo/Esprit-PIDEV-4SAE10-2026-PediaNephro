# APPLICATION
spring.application.name=nephro-forum
server.port=8097
# EUREKA CLIENT
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
# BASE DE DONNèES
spring.datasource.url=jdbc:mysql://localhost:3306/nephro_forum?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# UPLOAD FICHIERS
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
spring.web.resources.static-locations=file:${app.upload.dir}/
# CORS
app.cors.allowed-origins=http://localhost:4200