# APPLICATION ó nom Eureka / discovery
spring.application.name=subscription-service
server.port=${SERVER_PORT:8099}

# EUREKA CLIENT
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# BASE DE DONN…ES MySQL (aucun secret en dur ó utiliser l'environnement ou Config Server sťcurisť)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/subscription_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA + Flyway
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
subscription.flyway.repair-before-migrate=${SUBSCRIPTION_FLYWAY_REPAIR_BEFORE_MIGRATE:true}

# EMAIL ó uniquement via variables d'environnement
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false

# RabbitMQ dťsactivť
spring.rabbitmq.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# OpenFeign ? microservice utilisateur (mÍme nom Eureka que spring.application.name du User)
subscription.integration.user-service-name=${SUBSCRIPTION_USER_SERVICE_NAME:PEDIANEPHRO}
subscription.integration.user-validation-enabled=${SUBSCRIPTION_USER_VALIDATION_ENABLED:true}
