spring.application.name=PediaNephro
#configServer
spring.cloud.config.enabled=true
# Allow local startup when config-server isn't running on localhost:8899.
spring.config.import=optional:configserver:http://localhost:8888

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ─────────────────────────────────────────────────────────────────
# Keycloak – OAuth2 Resource Server (fallback local si config-server indisponible)
# ─────────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/pedia-nephro

# Keycloak Admin REST API
keycloak.server-url=http://localhost:8180
keycloak.realm=pedia-nephro
keycloak.client-id=user-ms
keycloak.client-secret=NPDUzaHf7NQd5zy9SrRQFalayQ62waZd

# ─────────────────────────────────────────────────────────────────
# DataSource (fallback si config-server indisponible)
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/PediaNephro?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=Q2hhbmdlVGhpc1RvQVN0cm9uZ1NlY3JldEtleUZvckpXVDEyMzQ1Njc4OTA=
jwt.expiration-ms=86400000

# ─────────────────────────────────────────────────────────────────
# Server / Eureka
