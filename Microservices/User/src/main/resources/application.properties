# ─────────────────────────────────────────────────────────────────
# reCAPTCHA
# ─────────────────────────────────────────────────────────────────
recaptcha.secret=${RECAPTCHA_SECRET:}
recaptcha.enabled=true
recaptcha.minimum-score=0.5

# ─────────────────────────────────────────────────────────────────
# Auth brute-force protection
# ─────────────────────────────────────────────────────────────────
auth.failed-login.max-attempts=3
auth.failed-login.lock-minutes=10
