spring.application.name=subscription-service
spring.config.import=optional:configserver:http://localhost:8888

# API publique (navigateur / Angular) : passer par la gateway http://localhost:8080
# Ex. http://localhost:8080/api/promo/all ou http://localhost:8080/api/promo (liste)
# Le port server.port ci-dessous sert à l'enregistrement Eureka ; accès direct 8099 = debug seulement.
# Fallback si config-server indisponible — Eureka requis pour la gateway (lb://subscription-service)
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Fallback si config-server indisponible (dev local)
server.port=${SERVER_PORT:8099}
server.forward-headers-strategy=framework
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/subscription_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway — table promo_code (colonnes subscription gérées par JPA / ddl-auto)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# true par défaut : repair() puis migrate() (débloque une V3 échouée). Mettre false seulement si besoin.
subscription.flyway.repair-before-migrate=${SUBSCRIPTION_FLYWAY_REPAIR_BEFORE_MIGRATE:true}

# Required for JavaMailSender bean (spring-boot-starter-mail backs off if host is unset).
# Override in production with real SMTP (e.g. via config server or env SPRING_MAIL_*).
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false

# OpenFeign → MS User (Eureka : PEDIANEPHRO, voir config-repo / application du User)
subscription.integration.user-service-name=${SUBSCRIPTION_USER_SERVICE_NAME:PEDIANEPHRO}
subscription.integration.user-validation-enabled=${SUBSCRIPTION_USER_VALIDATION_ENABLED:true}